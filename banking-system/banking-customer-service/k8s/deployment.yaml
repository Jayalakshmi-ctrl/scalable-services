apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-service
  namespace: banking-system
  labels:
    app: customer-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: customer-service
  template:
    metadata:
      labels:
        app: customer-service
    spec:
      containers:
        - name: customer-service
          image: banking-customer-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8001
              name: http
          envFrom:
            - configMapRef:
                name: customer-service-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: customer-service-secret
                  key: database-url
          resources:
            limits:
              memory: 256Mi
              cpu: 250m
            requests:
              memory: 128Mi
              cpu: 100m
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
